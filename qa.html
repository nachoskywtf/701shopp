<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Visual Top 15</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; text-align: center; }
        .card img { max-width: 100%; height: 250px; object-fit: contain; }
        h3 { font-size: 14px; margin: 10px 0 0 0; }
        p { font-size: 12px; color: #666; margin: 5px 0 0 0; }
    </style>
</head>
<body>
    <h1>QA Visual - Top 15 Otoño 2026</h1>
    <div class="grid" id="grid"></div>

    <script>
        fetch('/src/lib/catalog_output.json')
            .then(res => res.json())
            .then(data => {
                const top15 = data.slice(0, 15);
                const grid = document.getElementById('grid');
                top15.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div style="background:#eee; padding:5px; margin-bottom:10px; font-weight:bold;">#${index + 1}</div>
                        <img src="${item.image}" alt="${item.id}" onerror="this.src='/logo.svg'">
                        <h3>${item.id}</h3>
                        <p>${item.image}</p>
                    `;
                    grid.appendChild(card);
                });
            });
    </script>
</body>
</html>
